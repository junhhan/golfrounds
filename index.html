<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GolfRounds Hole Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Literata:opsz,wght@7..72,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-xs: clamp(0.75rem, 0.72rem + 0.18vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.84rem + 0.22vw, 1rem);
      --text-base: clamp(1rem, 0.96rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1.04rem + 0.42vw, 1.35rem);
      --text-xl: clamp(1.55rem, 1.25rem + 1vw, 2.1rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
      --radius-sm: 0.5rem; --radius-md: 0.8rem; --radius-lg: 1rem; --radius-xl: 1.25rem;
      --color-bg: #f7f6f2; --color-surface: #fbfbf9; --color-surface-2: #f2efe9;
      --color-border: #d8d4cc; --color-text: #26231d; --color-text-muted: #6f6d67;
      --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-soft: #dcebea;
      --color-danger-soft: #f8e7ea; --color-danger-text: #7c2230;
      --shadow-sm: 0 1px 2px rgba(22,22,22,.06); --shadow-md: 0 10px 28px rgba(22,22,22,.08);
      --font-body: 'Instrument Sans', system-ui, sans-serif; --font-display: 'Literata', Georgia, serif;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body { margin: 0; min-height: 100dvh; font-family: var(--font-body); color: var(--color-text); background: linear-gradient(180deg,#f7f6f2 0%,#efece5 100%); }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
    .app { max-width: 840px; margin: 0 auto; padding: var(--space-4); padding-bottom: calc(var(--space-10) + env(safe-area-inset-bottom)); }
    .hidden { display:none !important; }
    .screen { display:grid; gap: var(--space-5); }
    .card, .shot-item, .inline-message { background: rgba(251,251,249,.94); border:1px solid var(--color-border); box-shadow: var(--shadow-sm); }
    .card { border-radius: var(--radius-xl); padding: var(--space-5); }
    .hero { display:grid; gap: var(--space-4); }
    .brand { display:inline-flex; align-items:center; gap: var(--space-3); }
    .brand-mark { width:42px; height:42px; border-radius:999px; background: var(--color-primary-soft); display:grid; place-items:center; color: var(--color-primary); flex-shrink:0; }
    .brand-copy h1 { margin:0; font-family: var(--font-display); font-size: var(--text-xl); }
    .brand-copy p { margin: var(--space-1) 0 0; color: var(--color-text-muted); font-size: var(--text-sm); }
    .section-head { display:flex; justify-content:space-between; gap:var(--space-3); align-items:flex-start; }
    .section-head h2, .section-head h3 { margin:0; font-size: var(--text-lg); }
    .section-head p { margin: var(--space-1) 0 0; color: var(--color-text-muted); font-size: var(--text-sm); }
    .field-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: var(--space-3); }
    .field { display:grid; gap: var(--space-2); }
    .field.full { grid-column: 1 / -1; }
    .field label { font-size: var(--text-sm); font-weight:600; color: var(--color-text-muted); }
    .field input, .field select {
      width:100%; min-height:48px; border-radius: var(--radius-md); border:1px solid var(--color-border);
      background:white; padding:.85rem .95rem; color: var(--color-text); font-size: max(16px, var(--text-base));
    }
    .field input:focus, .field select:focus { outline:2px solid color-mix(in srgb, var(--color-primary) 28%, white); outline-offset:2px; border-color: var(--color-primary); }
    .btn-row { display:flex; gap: var(--space-3); flex-wrap:wrap; margin-top: var(--space-4); }
    .btn {
      min-height:46px; border-radius:999px; border:1px solid transparent; padding:.82rem 1.05rem; font-size: max(16px, var(--text-sm));
      font-weight:700; display:inline-flex; align-items:center; justify-content:center; gap:var(--space-2);
      transition: background var(--transition), border-color var(--transition), color var(--transition), transform var(--transition);
    }
    .btn:active { transform: translateY(1px); }
    .btn.primary { background: var(--color-primary); color:#fff; }
    .btn.primary:hover { background: var(--color-primary-hover); }
    .btn.secondary { background: var(--color-surface-2); color: var(--color-text); border-color: var(--color-border); }
    .btn.danger { background: var(--color-danger-soft); color: var(--color-danger-text); border-color:#e5bcc5; }
    .btn.ghost { background: transparent; border-color: var(--color-border); color: var(--color-text-muted); }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .round-list, .shot-list { display:grid; gap: var(--space-3); }
    .round-item { border:1px solid var(--color-border); border-radius: var(--radius-lg); background:white; padding: var(--space-4); display:grid; gap: var(--space-3); }
    .round-meta { display:flex; flex-wrap:wrap; gap: var(--space-2); }
    .tag { border-radius:999px; background: var(--color-surface-2); border:1px solid var(--color-border); color: var(--color-text-muted); padding:.45rem .7rem; font-size: var(--text-xs); font-weight:700; }
    .inline-message { border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4); color: var(--color-text-muted); font-size: var(--text-sm); display:none; }
    .inline-message.show { display:block; }
    .inline-message.error { background:#fff2f4; color:#7c2230; border-color:#ebc3ca; }
    .inline-message.success { background:#eef7f6; color: var(--color-primary-hover); border-color:#cfe1df; }
    .empty { border-radius: var(--radius-lg); border:1px dashed var(--color-border); background: rgba(255,255,255,.58); padding: var(--space-6); text-align:center; color: var(--color-text-muted); }
    .hole-topbar { display:flex; justify-content:space-between; gap: var(--space-3); align-items:center; }
    .hole-title { margin:0; font-size: var(--text-xl); font-family: var(--font-display); text-align:center; }
    .hole-nav-dots { display:flex; gap: var(--space-2); overflow-x:auto; padding-bottom: var(--space-1); justify-content:center; scrollbar-width:none; }
    .hole-nav-dots::-webkit-scrollbar { display:none; }
    .hole-dot { min-width:42px; min-height:42px; border-radius:999px; border:1px solid var(--color-border); background:white; color: var(--color-text-muted); font-size: var(--text-sm); font-weight:700; }
    .hole-dot.active { background: var(--color-primary); border-color: var(--color-primary); color:white; }
    .hole-pager { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: var(--space-3); }
    .option-group { display:grid; gap: var(--space-2); }
    .option-grid { display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: var(--space-2); }
    .option-grid.three { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .option-btn {
      min-height:48px; border-radius: var(--radius-md); border:1px solid var(--color-border); background:white; color: var(--color-text);
      font-size: var(--text-sm); font-weight:700; padding: .75rem .5rem;
    }
    .option-btn.active { background: var(--color-primary-soft); color: var(--color-primary-hover); border-color: var(--color-primary); }
    .helper-text { color: var(--color-text-muted); font-size: var(--text-xs); line-height: 1.5; }
    .shot-item { border-radius: var(--radius-lg); padding: var(--space-4); display:grid; gap: var(--space-3); }
    .shot-item-top { display:flex; justify-content:space-between; gap: var(--space-3); align-items:flex-start; }
    .shot-item strong { font-size: var(--text-base); }
    .shot-item p { margin: var(--space-1) 0 0; color: var(--color-text-muted); font-size: var(--text-sm); }
    .shot-actions { display:flex; gap: var(--space-2); flex-wrap:wrap; }
    .footer-note { text-align:center; color: var(--color-text-muted); font-size: var(--text-sm); margin-top: var(--space-2); }
    @media (max-width: 720px) {
      .app { padding: var(--space-3); }
      .card { padding: var(--space-4); }
      .field-grid { grid-template-columns: 1fr; }
      .section-head, .hole-topbar { flex-direction:column; align-items:stretch; }
      .btn-row, .shot-actions { display:grid; grid-template-columns:1fr 1fr; }
      .btn-row .btn:first-child { grid-column:1 / -1; }
      .hole-pager { grid-template-columns:1fr 1fr; }
      .option-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .option-grid.three { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .hole-dot { min-width:38px; min-height:38px; }
      .hole-pager .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="roundScreen" class="screen">
      <div class="card hero">
        <div class="brand" aria-label="GolfRounds">
          <div class="brand-mark" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="8" cy="16" r="3.1" stroke="currentColor" stroke-width="1.7"/>
              <path d="M11 16H19L15.7 7.2L11 16Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
              <path d="M12.2 6.7V3.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="brand-copy">
            <h1>라운드별 골프 기록</h1>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-head">
          <div>
            <h2>라운드 추가</h2>
            <p>필요한 정보만 먼저 넣고 바로 홀 화면으로 넘어갑니다.</p>
          </div>
        </div>
        <div class="field-grid" style="margin-top: var(--space-4);">
          <div class="field">
            <label for="roundDate">날짜</label>
            <input id="roundDate" type="date" />
          </div>
          <div class="field">
            <label for="courseName">코스</label>
            <input id="courseName" type="text" placeholder="예: MGC" />
          </div>
          <div class="field">
            <label for="holeCount">홀 수</label>
            <select id="holeCount">
              <option value="9">9홀</option>
              <option value="18" selected>18홀</option>
            </select>
          </div>
          <div class="field full">
            <label for="roundMemo">라운드 메모</label>
            <input id="roundMemo" type="text" placeholder="예: 바람 강함, 그린 빠름" />
          </div>
        </div>
        <div class="btn-row">
          <button class="btn primary" id="createRoundBtn" type="button">홀 화면으로</button>
        </div>
        <div class="inline-message" id="roundMessage"></div>
      </div>

      <div class="card">
        <div class="section-head">
          <div>
            <h2>저장된 라운드</h2>
            <p>기존 라운드를 열면 홀 화면으로 이동합니다.</p>
          </div>
        </div>
        <div id="historyContainer" class="round-list" style="margin-top: var(--space-4);"></div>
      </div>
    </section>

    <section id="holeScreen" class="screen hidden">
      <div class="card">
        <div class="hole-topbar">
          <button class="btn ghost" id="backToRoundsBtn" type="button">← 라운드 목록</button>
          <div class="btn-row" style="margin-top:0;">
            <button class="btn secondary" id="downloadBtn" type="button">JSON 저장</button>
            <label class="btn secondary" for="importInput" style="cursor:pointer;">JSON 불러오기</label>
            <input id="importInput" type="file" accept="application/json" class="sr-only" />
            <button class="btn danger" id="resetBtn" type="button">전체 삭제</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2 class="hole-title">홀번호</h2>
        <div id="holeDots" class="hole-nav-dots" style="margin-top: var(--space-4);"></div>
        <div class="hole-pager" style="margin-top: var(--space-4);">
          <button class="btn secondary" id="prevHoleBtn" type="button">← 이전홀</button>
          <button class="btn secondary" id="nextHoleBtn" type="button">다음홀 →</button>
        </div>
      </div>

      <div class="card">
        <div class="section-head"><div><h3>현재 홀 입력</h3></div></div>
        <div class="field-grid" style="margin-top: var(--space-4);">
          <div class="field">
            <label for="holePar">파</label>
            <select id="holePar">
              <option value="3">Par 3</option>
              <option value="4" selected>Par 4</option>
              <option value="5">Par 5</option>
            </select>
          </div>
          <div class="field">
            <label for="shotNumber">샷 번호</label>
            <input id="shotNumber" type="number" min="1" inputmode="numeric" placeholder="예: 1" />
          </div>
          <div class="field full option-group">
            <label>클럽</label>
            <div id="clubOptions" class="option-grid three"></div>
          </div>
          <div class="field">
            <label for="shotDist">남은 거리(m)</label>
            <input id="shotDist" type="number" min="0" inputmode="numeric" placeholder="예: 145" />
          </div>
          <div class="field full option-group">
            <label>위치</label>
            <div id="locationOptions" class="option-grid"></div>
            <div class="helper-text">FW(페어웨이), H(홀), Rg(러프), B(벙커), G(그린), L(왼쪽), R(오른쪽), Sh(짧음), Lg(김)</div>
          </div>
          <div class="field full option-group">
            <label>노트</label>
            <div id="noteOptions" class="option-grid"></div>
            <div class="helper-text">T(탑핑), F(팻), H(훅), S(슬라이스), U(업), D(다운)</div>
          </div>
          <div class="field full option-group">
            <label>미스샷</label>
            <div id="missOptions" class="option-grid three"></div>
            <div class="helper-text">Yes(미스샷), No(정상 샷)</div>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn ghost hidden" id="cancelEditBtn" type="button">수정 취소</button>
        </div>
        <div class="inline-message" id="shotMessage"></div>
      </div>

      <div class="card">
        <div class="section-head"><div><h3>이 홀의 샷 기록</h3></div></div>
        <div id="shotList" class="shot-list" style="margin-top: var(--space-4);"></div>
      </div>
    </section>

    <p class="footer-note">Created by JunHee Han</p>
  </main>

  <script>
    const CLUB_OPTIONS = ['D', '3W', '5W', '4H', '5H', '5i', '6i', '7i', '8i', '9i', 'PW', 'AW', 'SW', 'PT'];
    const MISS_OPTIONS = ['Yes', 'No'];
    const LOCATION_OPTIONS = ['FW', 'H', 'Rg', 'B', 'G', 'L', 'R', 'Sh', 'Lg'];
    const NOTE_OPTIONS = ['T', 'F', 'H', 'S', 'U', 'D'];

    const state = {
      rounds: [],
      selectedRoundId: null,
      currentHoleIndex: 0,
      editingShotId: null,
      currentScreen: 'rounds',
      draft: { club: '', miss: '', location: [], note: [] }
    };

    const $ = (id) => document.getElementById(id);
    const uid = () => Math.random().toString(36).slice(2, 10);

    function todayLocal() {
      const now = new Date();
      const tzOffset = now.getTimezoneOffset() * 60000;
      return new Date(now.getTime() - tzOffset).toISOString().slice(0, 10);
    }

    function showScreen(name) {
      state.currentScreen = name;
      $('roundScreen').classList.toggle('hidden', name !== 'rounds');
      $('holeScreen').classList.toggle('hidden', name !== 'hole');
      window.scrollTo({ top: 0, behavior: 'auto' });
    }

    function showMessage(targetId, text, type = 'success') {
      const el = $(targetId);
      el.textContent = text;
      el.className = `inline-message show ${type}`;
    }

    function clearMessage(targetId) {
      const el = $(targetId);
      el.textContent = '';
      el.className = 'inline-message';
    }

    function getSelectedRound() {
      return state.rounds.find((round) => round.id === state.selectedRoundId) || null;
    }

    function getCurrentHole() {
      const round = getSelectedRound();
      return round ? round.holes[state.currentHoleIndex] || null : null;
    }

    function countTotalShots(round) {
      return round.holes.reduce((sum, hole) => sum + hole.shots.length, 0);
    }

    function roundTitle(round) {
      return `${round.date || '날짜 미정'} · ${round.course || '코스 미정'}`;
    }

    function summarizeShot(shot) {
      const bits = [];
      if (shot.club) bits.push(shot.club);
      if (Array.isArray(shot.location) ? shot.location.length : shot.location) bits.push(Array.isArray(shot.location) ? shot.location.join(',') : shot.location);
      if (shot.miss) bits.push(shot.miss);
      if (Array.isArray(shot.note) ? shot.note.length : shot.note) bits.push(`N:${Array.isArray(shot.note) ? shot.note.join(',') : shot.note}`);
      return bits.length ? bits.join(' · ') : '요약 없음';
    }

    function getNextShotNumber(hole) {
      if (!hole || !hole.shots.length) return 1;
      const nums = hole.shots.map((shot) => Number(shot.number)).filter((n) => !Number.isNaN(n));
      return nums.length ? Math.max(...nums) + 1 : 1;
    }

    function buzz(ms = 12) {
      if (typeof navigator !== 'undefined' && 'vibrate' in navigator) {
        navigator.vibrate(ms);
      }
    }

    function setDraft(key, value) {
      if (key === 'location' || key === 'note') {
        const list = Array.isArray(state.draft[key]) ? [...state.draft[key]] : [];
        const index = list.indexOf(value);
        if (index >= 0) list.splice(index, 1);
        else list.push(value);
        state.draft[key] = list;
      } else {
        state.draft[key] = state.draft[key] === value ? '' : value;
      }
      buzz();
      renderSelections();
      maybePromptAutoAdd();
    }

    function renderOptionButtons(containerId, options, key) {
      const container = $(containerId);
      container.innerHTML = '';
      options.forEach((option) => {
        const button = document.createElement('button');
        button.type = 'button';
        const active = Array.isArray(state.draft[key]) ? state.draft[key].includes(option) : state.draft[key] === option;
        button.className = `option-btn${active ? ' active' : ''}`;
        button.textContent = option;
        button.addEventListener('click', () => setDraft(key, option));
        container.appendChild(button);
      });
    }

    function renderSelections() {
      renderOptionButtons('clubOptions', CLUB_OPTIONS, 'club');
      renderOptionButtons('missOptions', MISS_OPTIONS, 'miss');
      renderOptionButtons('locationOptions', LOCATION_OPTIONS, 'location');
      renderOptionButtons('noteOptions', NOTE_OPTIONS, 'note');
    }


    function maybePromptAutoAdd() {
      const hole = getCurrentHole();
      if (!hole || state.currentScreen !== 'hole' || state.editingShotId) return;
      const club = state.draft.club;
      const hasMiss = !!state.draft.miss;
      if (!club || !hasMiss) return;
      const number = Number($('shotNumber').value) || getNextShotNumber(hole);
      const ok = confirm('샷을 추가하시겠습니까?');
      if (!ok) return;
      hole.par = $('holePar').value;
      hole.shots.push({
        id: uid(),
        number,
        club,
        dist: $('shotDist').value.trim(),
        miss: state.draft.miss,
        location: [...state.draft.location],
        note: [...state.draft.note],
      });
      hole.shots.sort((a, b) => Number(a.number) - Number(b.number));
      renderRoundList();
      showMessage('shotMessage', '샷을 추가했어요.');
      clearShotForm();
      renderHoleScreen();
    }

    function syncShotNumber() {
      const hole = getCurrentHole();
      if (!hole || state.editingShotId) return;
      $('shotNumber').value = getNextShotNumber(hole);
    }

    function clearShotForm() {
      state.editingShotId = null;
      state.draft = { club: '', miss: '', location: [], note: [] };
      $('cancelEditBtn').classList.add('hidden');
      $('shotDist').value = '';
      clearMessage('shotMessage');
      syncShotNumber();
      renderSelections();
    }

    function openRound(roundId, holeIndex = 0) {
      state.selectedRoundId = roundId;
      state.currentHoleIndex = holeIndex;
      clearShotForm();
      renderHoleScreen();
      showScreen('hole');
    }

    function createRound() {
      const date = $('roundDate').value || todayLocal();
      const course = $('courseName').value.trim() || 'MGC';
      const memo = $('roundMemo').value.trim();
      const holeCount = Number($('holeCount').value || 18);
      const holes = Array.from({ length: holeCount }, (_, index) => ({ id: uid(), number: index + 1, par: '4', shots: [] }));
      const round = { id: uid(), date, course, memo, holeCount, holes };
      state.rounds.unshift(round);
      $('courseName').value = '';
      $('roundMemo').value = '';
      clearMessage('roundMessage');
      renderRoundList();
      openRound(round.id, 0);
    }

    function renderRoundList() {
      const container = $('historyContainer');
      if (!state.rounds.length) {
        container.innerHTML = '<div class="empty">아직 라운드가 없어요. 위에서 첫 라운드를 만들어보세요.</div>';
        return;
      }
      container.innerHTML = '';
      state.rounds.forEach((round) => {
        const card = document.createElement('article');
        card.className = 'round-item';
        card.innerHTML = `
          <div class="section-head">
            <div>
              <h3>${roundTitle(round)}</h3>
              <p>${round.memo || '라운드 메모 없음'}</p>
            </div>
            <div class="round-meta">
              <span class="tag">${round.holeCount}홀</span>
              <span class="tag">총 ${countTotalShots(round)}샷</span>
            </div>
          </div>
          <div class="btn-row" style="margin-top:0;">
            <button class="btn primary" type="button" data-action="open">홀 화면 열기</button>
            <button class="btn danger" type="button" data-action="remove">라운드 삭제</button>
          </div>`;
        card.querySelector('[data-action="open"]').addEventListener('click', () => openRound(round.id, 0));
        card.querySelector('[data-action="remove"]').addEventListener('click', () => {
          if (!confirm('이 라운드를 삭제할까요?')) return;
          state.rounds = state.rounds.filter((item) => item.id !== round.id);
          if (state.selectedRoundId === round.id) {
            state.selectedRoundId = null;
            state.currentHoleIndex = 0;
          }
          renderRoundList();
          showScreen('rounds');
        });
        container.appendChild(card);
      });
    }

    function renderHoleDots(round) {
      const dots = $('holeDots');
      dots.innerHTML = '';
      round.holes.forEach((hole, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `hole-dot${index === state.currentHoleIndex ? ' active' : ''}`;
        button.textContent = hole.number;
        button.setAttribute('aria-label', `${hole.number}번홀로 이동`);
        button.addEventListener('click', () => {
          state.currentHoleIndex = index;
          clearShotForm();
          renderHoleScreen();
        });
        dots.appendChild(button);
      });
    }

    function renderShotList(hole) {
      const list = $('shotList');
      if (!hole.shots.length) {
        list.innerHTML = '<div class="empty">아직 이 홀에 기록된 샷이 없어요.</div>';
        return;
      }
      list.innerHTML = '';
      [...hole.shots].sort((a, b) => Number(a.number) - Number(b.number)).forEach((shot) => {
        const item = document.createElement('article');
        item.className = 'shot-item';
        item.innerHTML = `
          <div class="shot-item-top">
            <div>
              <strong>${shot.number}번 샷 · ${summarizeShot(shot)}</strong>
              <p>${shot.dist ? `${shot.dist}m` : '거리 미입력'}</p>
            </div>
            <div class="shot-actions">
              <button class="btn secondary" type="button" data-action="edit">수정</button>
              <button class="btn danger" type="button" data-action="delete">삭제</button>
            </div>
          </div>`;
        item.querySelector('[data-action="edit"]').addEventListener('click', () => {
          state.editingShotId = shot.id;
          state.draft.club = shot.club || '';
          state.draft.miss = shot.miss || '';
          state.draft.location = Array.isArray(shot.location) ? [...shot.location] : (shot.location ? [shot.location] : []);
          state.draft.note = Array.isArray(shot.note) ? [...shot.note] : (shot.note ? [shot.note] : []);
          $('cancelEditBtn').classList.remove('hidden');
          $('shotNumber').value = shot.number || '';
          $('shotDist').value = shot.dist || '';
          clearMessage('shotMessage');
          renderSelections();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        item.querySelector('[data-action="delete"]').addEventListener('click', () => {
          if (!confirm('이 샷을 삭제할까요?')) return;
          hole.shots = hole.shots.filter((entry) => entry.id !== shot.id);
          if (state.editingShotId === shot.id) clearShotForm();
          renderHoleScreen();
          showMessage('shotMessage', '샷을 삭제했어요.');
        });
        list.appendChild(item);
      });
    }

    function renderHoleScreen() {
      const round = getSelectedRound();
      const hole = getCurrentHole();
      if (!round || !hole) {
        showScreen('rounds');
        return;
      }
      $('holePar').value = hole.par || '4';
      renderHoleDots(round);
      renderShotList(hole);
      renderSelections();
      $('prevHoleBtn').disabled = state.currentHoleIndex === 0;
      $('nextHoleBtn').disabled = state.currentHoleIndex === round.holes.length - 1;
      syncShotNumber();
    }

    function saveShot() {
      const hole = getCurrentHole();
      if (!hole) return showMessage('shotMessage', '먼저 라운드를 열어 주세요.', 'error');
      const club = state.draft.club;
      const miss = state.draft.miss;
      const location = Array.isArray(state.draft.location) ? [...state.draft.location] : [];
      const note = Array.isArray(state.draft.note) ? [...state.draft.note] : [];
      const dist = $('shotDist').value.trim();
      let number = Number($('shotNumber').value);
      if (!number) number = state.editingShotId ? Number($('shotNumber').value || 1) : getNextShotNumber(hole);
      if (!club) return showMessage('shotMessage', '클럽을 선택해 주세요.', 'error');
      if (!miss) return showMessage('shotMessage', '미스샷 여부를 선택해 주세요.', 'error');
      hole.par = $('holePar').value;
      const payload = { number, club, dist, miss, location, note };
      if (state.editingShotId) {
        const target = hole.shots.find((shot) => shot.id === state.editingShotId);
        if (target) Object.assign(target, payload);
        showMessage('shotMessage', '샷을 수정했어요.');
      } else {
        hole.shots.push({ id: uid(), ...payload });
        showMessage('shotMessage', '샷을 추가했어요.');
      }
      hole.shots.sort((a, b) => Number(a.number) - Number(b.number));
      renderRoundList();
      renderHoleScreen();
      clearShotForm();
    }

    $('createRoundBtn').addEventListener('click', createRound);
    $('backToRoundsBtn').addEventListener('click', () => showScreen('rounds'));
    $('cancelEditBtn').addEventListener('click', clearShotForm);
    $('prevHoleBtn').addEventListener('click', () => {
      if (state.currentHoleIndex === 0) return;
      state.currentHoleIndex -= 1;
      clearShotForm();
      renderHoleScreen();
    });
    $('nextHoleBtn').addEventListener('click', () => {
      const round = getSelectedRound();
      if (!round || state.currentHoleIndex >= round.holes.length - 1) return;
      state.currentHoleIndex += 1;
      clearShotForm();
      renderHoleScreen();
    });
    $('holePar').addEventListener('change', () => {
      const hole = getCurrentHole();
      if (!hole) return;
      hole.par = $('holePar').value;
      renderRoundList();
    });
    $('downloadBtn').addEventListener('click', () => {
      const payload = JSON.stringify(state.rounds, null, 2);
      const blob = new Blob([payload], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `golf-rounds-${todayLocal()}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
    });
    $('importInput').addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (!Array.isArray(parsed)) throw new Error('invalid');
        state.rounds = parsed.map((round) => ({
          ...round,
          id: round.id || uid(),
          holeCount: round.holeCount || (Array.isArray(round.holes) ? round.holes.length : 18),
          holes: Array.isArray(round.holes) ? round.holes.map((hole, index) => ({
            id: hole.id || uid(),
            number: hole.number || index + 1,
            par: String(hole.par || 4),
            shots: Array.isArray(hole.shots) ? hole.shots.map((shot) => ({ id: shot.id || uid(), ...shot })) : [],
          })) : [],
        }));
        state.selectedRoundId = state.rounds[0]?.id || null;
        state.currentHoleIndex = 0;
        clearShotForm();
        renderRoundList();
        if (state.selectedRoundId) openRound(state.selectedRoundId, 0);
        else showScreen('rounds');
      } catch (error) {
        showMessage('roundMessage', 'JSON 파일 형식을 확인해 주세요.', 'error');
        showScreen('rounds');
      } finally {
        event.target.value = '';
      }
    });
    $('resetBtn').addEventListener('click', () => {
      if (!confirm('정말 모든 라운드 기록을 지울까요?')) return;
      state.rounds = [];
      state.selectedRoundId = null;
      state.currentHoleIndex = 0;
      clearShotForm();
      renderRoundList();
      showScreen('rounds');
      showMessage('roundMessage', '모든 기록을 비웠어요.');
    });

    $('roundDate').value = todayLocal();
    renderSelections();
    renderRoundList();
    showScreen('rounds');
  </script>
</body>
</html>
